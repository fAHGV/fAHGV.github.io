<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXCODE Intelligence | iOS 26 Aesthetic</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- iOS 26 ГЛОБАЛЬНЫЕ СТИЛИ --- */
        :root {
            /* Палитра: Светлая, чистая, премиальная */
            --bg-light: #f5f5f7;
            --accent-blue: #0071e3; /* Фирменный синий Apple */
            --accent-green: #34c759; /* Светящийся зеленый для успеха */
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            
            /* Мягкие тени для объема (Neumorphism) */
            --soft-shadow: 0 10px 40px rgba(0,0,0,0.05);
            --active-shadow: 0 5px 15px rgba(0,0,0,0.1);
            
            /* Шрифт Apple-style */
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-primary);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(#dcdcdc 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* --- АНИМАЦИЯ ФОНА (Органичные блики) --- */
        body::before {
            content: "";
            position: fixed;
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(0,113,227,0.08) 0%, rgba(245,245,247,0) 70%);
            border-radius: 50%;
            top: -200px; left: -200px;
            z-index: -1;
            animation: orbFloat 25s infinite alternate ease-in-out;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(calc(100vw - 400px), calc(100vh - 400px)); }
        }

        .container {
            width: 90%;
            max-width: 1300px;
            padding: 40px 0;
            display: grid;
            grid-template-columns: 1fr 1.8fr; /* Виджеты слева, результат справа */
            gap: 30px;
            align-items: start;
        }

        /* --- ХЕДЕР (Премиальный минимализм) --- */
        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 1s ease-out;
        }

        header h1 {
            font-weight: 700;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: -1px;
            color: var(--text-primary);
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 5px;
            font-weight: 300;
        }

        /* --- ОБЩИЕ СТИЛИ ВИДЖЕТОВ (iOS-style cards) --- */
        .widget {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; /* Очень мягкие углы */
            padding: 25px;
            box-shadow: var(--soft-shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
            animation: widgetSpawn 0.6s ease-out both;
        }

        .widget:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
        }

        @keyframes widgetSpawn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .widget h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 20px 0;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- ВХОДНОЙ ВИДЖЕТ --- */
        .input-widget {
            grid-column: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea#prompt {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.03); /* Очень легкий инпут */
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            color: var(--text-primary);
            padding: 18px;
            font-family: var(--font-main);
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        textarea#prompt:focus {
            outline: none;
            background: #fff;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        /* --- КНОПКИ (iOS-style interaction) --- */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-blue);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: #0077ed;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
            box-shadow: var(--active-shadow);
        }

        button.run-btn {
            background-color: var(--accent-green);
        }
        button.run-btn:hover { background-color: #30b651; }

        /* --- ВЫХОДНОЙ ВИДЖЕТ ЧИСТЫЙ КОД --- */
        .output-widget {
            grid-column: 2;
            grid-row: 1 / 3; /* Занимает две строки высоты */
        }

        textarea#output {
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            color: #24292e; /* Цвет кода GitHub Light */
            padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            tab-size: 4;
            transition: 0.3s;
        }

        /* Чистая консоль без хакерских эффектов */
        .console-widget {
            grid-column: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #terminal {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            padding: 18px;
            color: var(--text-primary);
            font-family: 'Consolas', monospace;
            font-size: 14px;
            height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* --- АНИМАЦИЯ ЗАГРУЗКИ (iOS Spinner) --- */
        .ios-loader {
            display: none;
            width: 24px; height: 24px;
            border: 3px solid rgba(0,113,227,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: iosSpin 0.8s linear infinite;
        }

        @keyframes iosSpin {
            to { transform: rotate(360deg); }
        }

        /* Утилиты */
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
        select { background: none; border: 1px solid #dcdcdc; border-radius: 8px; padding: 6px 10px; font-family: var(--font-main); font-size: 14px; }
    
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NEXCODE Intelligence</h1>
        <p>Advanced Programming Hub | Aesthetic Edition</p>
    </header>

    <div class="widget input-widget">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            Task Input
        </h2>
        <textarea id="prompt" placeholder="Опиши задачу: 'Напиши красивый виджет на JavaFX'"></textarea>
        <button onclick="generateAI()">
            <div class="ios-loader" id="ai-loader"></div>
            <span id="btn-text">Generate & Sync</span>
        </button>
    </div>

    <div class="widget console-widget">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            NEX-CORE Terminal
        </h2>
        <div id="terminal">> Status: Optimal. Ready.</div>
        <button class="run-btn" onclick="executeCode()">Execute in Cloud</button>
    </div>

    <div class="widget output-widget">
        <div class="flex-between">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                Source_Code.log
            </h2>
            <select id="lang">
                <option value="java">Java 26</option>
                <option value="python">Python 3.14</option>
                <option value="javascript">JavaScript 2026</option>
            </select>
        </div>
        <textarea id="output" readonly placeholder="// NEXCODE Intelligent Output..."></textarea>
    </div>

</div>

<script>
    // ТВОЙ ТОКЕН ИЗ ПРОШЛОГО КОДА
    const TOKEN = "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";

    async function generateAI() {
        const input = document.getElementById('prompt').value;
        const outArea = document.getElementById('output');
        const loader = document.getElementById('ai-loader');
        const btnText = document.getElementById('btn-text');

        if(!input) return alert("Введите запрос!");

        loader.style.display = 'block';
        btnText.innerText = 'Connecting...';
        outArea.value = "// [NEXCODE Intelligence] Syncing logic patterns...\n// Establishing semantic connection...";

        try {
            const res = await fetch("https://api-inference.huggingface.co/models/deepseek-ai/deepseek-coder-6.7b-instruct", {
                method: "POST",
                headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    inputs: `You are NEXCODE AI (iOS 26 Aesthetic Edition). 
Write high-quality professional code for: ${input}. Output only raw code. Include class Main if Java. NO Markdown or talk.`,
                    parameters: { max_new_tokens: 1400, temperature: 0.15 }
                })
            });
            const data = await res.json();
            let code = data[0].generated_text || "// Error: Neural connection lost.";
            
            // Чистим мусор
            code = code.replace(/```[a-z]*/g, "").replace(/```/g, "").trim();
            outArea.value = code;

        } catch (e) {
            outArea.value = "// NEXCODE Intelligence Error: API or Token issue.";
        } finally {
            loader.style.display = 'none';
            btnText.innerText = 'Generate & Sync';
        }
    }

    async function executeCode() {
        const code = document.getElementById('output').value;
        const language = document.getElementById('lang').value;
        const terminal = document.getElementById('terminal');

        terminal.innerText = "> Status: Compiling...\n> Allocating Core resources...\n";

        try {
            const response = await fetch("https://emkc.org/api/v2/piston/execute", {
                method: "POST",
                body: JSON.stringify({
                    language: language,
                    version: "*",
                    files: [{ content: code }]
                })
            });
            const result = await response.json();
            terminal.innerText = result.run.output || result.run.stderr || "> Process finished. Optimal exit.";
        } catch (e) {
            terminal.innerText = "> Critical Runtime Error: Cloud Core connection failed.";
        }
    }

</script>

</body>
</html>
